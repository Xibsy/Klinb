<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink Web Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-theme="dark">

    <div id="map"></div>

    <div class="ui-overlay">
        <header class="top-bar">
            <div class="profile-btn" onclick="openProfile()">
                <img src="/static/uploads/volosatic.jpg" alt="Avatar" id="nav-avatar">
                <span id="nav-username">Загрузка...</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn" onclick="flyToMyLocation()" title="Моя позиция">📍</button>
                <button class="icon-btn" onclick="openAddFriendModal()" title="Добавить друга">+</button>

                <!-- ── Кнопка уведомлений о запросах в друзья ── -->
                <button class="icon-btn notif-btn" id="requests-btn"
                        onclick="openRequestsModal()" title="Запросы в друзья">
                    🔔
                    <span class="notif-badge" id="requests-badge" style="display:none">0</span>
                </button>

                <button class="icon-btn" id="theme-toggle" title="Сменить тему">🌓</button>
                <button class="icon-btn" onclick="location.href='/lenta'" title="Лента">📰</button>
                <button class="icon-btn" onclick="logout()" title="Выйти">🚪</button>
            </div>
        </header>

        <footer class="bottom-sheet">
            <div class="friends-scroll" id="friends-list"></div>
        </footer>
    </div>

    <!-- Profile modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>

            <div id="view-mode">
                <div class="profile-display">
                    <img src="" id="display-avatar" class="large-avatar">
                    <h2 id="display-name">Имя Фамилия</h2>
                    <p id="display-username">@username</p>
                </div>
                <div class="social-info">
                    <div class="info-row"><span>💬</span> <span id="display-discord">не указан</span></div>
                    <div class="info-row"><span>✈️</span> <span id="display-telegram">не указан</span></div>
                </div>
                <button class="edit-mode-btn" onclick="toggleEdit(true)">Редактировать профиль</button>
                <button class="close-btn" onclick="closeProfile()">Закрыть</button>
            </div>

            <div id="edit-mode" style="display: none;">
                <div class="profile-edit-header">
                    <div class="avatar-wrapper" onclick="document.getElementById('avatar-input').click()">
                        <img src="" id="edit-avatar">
                        <div class="edit-overlay">📸</div>
                    </div>
                    <input type="file" id="avatar-input" hidden accept="image/*">
                    <div id="avatar-upload-status" class="upload-status"></div>

                    <input type="text" id="input-name" class="edit-input-field name-field" placeholder="Твоё Имя">
                    <input type="text" id="input-username" class="edit-input-field user-field" placeholder="@username">
                    <div id="username-error" class="field-error"></div>
                </div>

                <div class="social-section">
                    <div class="input-group">
                        <span class="icon">💬</span>
                        <input type="text" id="input-discord" placeholder="Discord ID">
                    </div>
                    <div class="input-group">
                        <span class="icon">✈️</span>
                        <input type="text" id="input-telegram" placeholder="Telegram @handle">
                    </div>
                </div>

                <div class="actions">
                    <button class="save-btn" id="save-btn" onclick="saveProfile()">Сохранить</button>
                    <button class="close-btn" onclick="toggleEdit(false)">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add friend modal -->
    <div id="add-friend-modal" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Добавить друга</h3>
            <p class="modal-subtitle">Введите @username или имя пользователя</p>
            <input type="text" id="friend-search-input" class="edit-input-field" placeholder="@username">
            <div id="friend-search-result" class="friend-search-result"></div>
            <button class="save-btn" onclick="searchAndAddFriend()">Найти</button>
            <button class="close-btn" onclick="closeAddFriendModal()">Отмена</button>
        </div>
    </div>

    <!-- ── Модал: Запросы в друзья ── -->
    <div id="requests-modal" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h3 class="modal-title">Запросы в друзья</h3>
            <p class="modal-subtitle" id="requests-subtitle">Входящие запросы</p>

            <!-- Вкладки -->
            <div class="requests-tabs">
                <button class="req-tab active" id="tab-incoming" onclick="switchRequestsTab('incoming')">
                    Входящие <span class="tab-count" id="incoming-count">0</span>
                </button>
                <button class="req-tab" id="tab-outgoing" onclick="switchRequestsTab('outgoing')">
                    Исходящие <span class="tab-count" id="outgoing-count">0</span>
                </button>
            </div>

            <!-- Список запросов -->
            <div id="requests-list" class="requests-list">
                <div class="requests-empty">Загрузка...</div>
            </div>

            <button class="close-btn" onclick="closeRequestsModal()">Закрыть</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
