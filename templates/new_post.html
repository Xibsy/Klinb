<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый пост</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        form { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        label { display: block; margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { margin-top: 20px; padding: 10px 20px; background: #34c759; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .nav-links { text-align: center; margin-bottom: 20px; }
        .nav-links a { margin: 0 10px; color: #34c759; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav-links">
        <a href="/">Карта</a> |
        <a href="/lenta">Лента</a> |
        <a href="#" onclick="logout()">Выйти</a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <h2>Создать пост</h2>

        <p><small>Подсказка: используйте #хештеги для группировки постов</small></p>

        <label>Выберите пользователя:</label>
        <select name="user_id" required>
            <option value="">-- выберите --</option>
            {% for user in users %}
            <option value="{{ user.id }}">{{ user.name }} (@{{ user.username }})</option>
            {% endfor %}
        </select>

        <label>Текст:</label>
        <textarea name="content" rows="4" placeholder="Что у вас нового? Используйте #хештеги" required></textarea>

        <label>Фото (необязательно):</label>
        <input type="file" name="image" accept="image/*">

        <button type="submit">Опубликовать</button>
    </form>

    <script>
        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(() => {
                    localStorage.removeItem('blink_user');
                    window.location.href = '/';
                });
        }
    </script>
</body>
</html>
