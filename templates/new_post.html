<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Новый пост — Blink Web Pro</title>
    <style>
        /* ─── TOKENS ─────────────────────────────────────── */
        :root {
            --bg: #ffffff;
            --text: #101010;
            --card: #f2f2f7;
            --accent: #34c759;
            --accent-dim: rgba(52, 199, 89, 0.15);
            --blur: rgba(255, 255, 255, 0.82);
            --danger: #ff3b30;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --border: rgba(0, 0, 0, 0.06);
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #ffffff;
            --card: #1c1c1e;
            --accent: #30d158;
            --accent-dim: rgba(48, 209, 88, 0.15);
            --blur: rgba(18, 18, 18, 0.85);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            --border: rgba(255, 255, 255, 0.06);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        /* ─── TOP BAR ─────────────────────────────────────── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--blur);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        .top-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 18px;
            box-shadow: var(--shadow);
            color: var(--text);
            transition: transform var(--transition), background var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .icon-btn:active { transform: scale(0.9); }

        /* ─── FORM CONTAINER ──────────────────────────────── */
        .form-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 28px 16px 80px;
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── FORM CARD ───────────────────────────────────── */
        .form-card {
            background: var(--card);
            border-radius: 28px;
            border: 1px solid var(--border);
            padding: 24px 20px;
            box-shadow: var(--shadow);
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
            display: block;
        }

        /* ─── TEXTAREA ────────────────────────────────────── */
        .post-textarea {
            width: 100%;
            min-height: 160px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            line-height: 1.55;
            resize: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            margin-bottom: 20px;
        }

        .post-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .post-textarea::placeholder { color: #8e8e93; }

        /* Hashtag hint */
        .hint {
            font-size: 12px;
            color: #8e8e93;
            margin: -14px 0 18px 4px;
        }

        .hint span { color: var(--accent); font-weight: 600; }

        /* ─── IMAGE UPLOAD ────────────────────────────────── */
        .image-upload-area {
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 18px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            margin-bottom: 28px;
            position: relative;
        }

        .image-upload-area:hover,
        .image-upload-area.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .image-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon { font-size: 32px; margin-bottom: 8px; }

        .upload-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .upload-sub {
            font-size: 12px;
            color: #8e8e93;
        }

        /* Preview image */
        .image-preview {
            width: 100%;
            border-radius: 16px;
            object-fit: cover;
            max-height: 240px;
            display: none;
            margin-top: 12px;
        }

        /* ─── DIVIDER ─────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* ─── BUTTONS ─────────────────────────────────────── */
        .save-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 17px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            font-family: inherit;
            transition: opacity var(--transition), transform var(--transition);
        }

        .save-btn:hover   { opacity: 0.9; }
        .save-btn:active  { transform: scale(0.97); }
        .save-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .cancel-btn {
            width: 100%;
            background: transparent;
            color: #8e8e93;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: color var(--transition);
        }

        .cancel-btn:hover { color: var(--text); }

        /* ─── CHAR COUNTER ────────────────────────────────── */
        .char-row {
            display: flex;
            justify-content: flex-end;
            margin-top: -14px;
            margin-bottom: 20px;
        }

        .char-count {
            font-size: 12px;
            color: #8e8e93;
            font-weight: 500;
            transition: color var(--transition);
        }

        .char-count.warn  { color: #ff9f0a; }
        .char-count.limit { color: var(--danger); }
    </style>
</head>
<body>

    <header class="top-bar">
        <span class="top-bar-title">✏️ Новый пост</span>
        <div class="top-actions">
            <a class="icon-btn" href="/lenta" title="Лента">📰</a>
            <a class="icon-btn" href="/" title="Карта">🗺️</a>
            <button class="icon-btn" id="theme-toggle" title="Сменить тему" onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div class="form-container">
        <div class="form-card">

            <form method="POST" enctype="multipart/form-data" id="post-form">

                <label class="form-label" for="post-text">Текст поста</label>
                <textarea
                    class="post-textarea"
                    id="post-text"
                    name="content"
                    maxlength="2000"
                    placeholder="Что у вас нового?"
                    required
                    oninput="updateCharCount(this)"></textarea>

                <div class="char-row">
                    <span class="char-count" id="char-count">0 / 2000</span>
                </div>

                <p class="hint">Используй <span>#хэштеги</span> для лучшего охвата</p>

                <label class="form-label">Фото (необязательно)</label>
                <div class="image-upload-area" id="upload-area">
                    <input type="file" name="image" accept="image/*" id="image-input"
                           onchange="previewImage(this)">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">Нажми или перетащи фото</div>
                    <div class="upload-sub">PNG, JPG, WEBP — до 10 МБ</div>
                    <img class="image-preview" id="img-preview" alt="Предпросмотр">
                </div>

                <div class="divider"></div>

                <button type="submit" class="save-btn" id="submit-btn">Опубликовать</button>
                <button type="button" class="cancel-btn" onclick="history.back()">Отмена</button>

            </form>

        </div>
    </div>

    <script>
        // ─── Theme ──────────────────────────────────────────
        (function () {
            const saved = localStorage.getItem('blink_theme') || 'dark';
            document.body.setAttribute('data-theme', saved);
        })();

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('blink_theme', next);
        }

        // ─── Char counter ────────────────────────────────────
        function updateCharCount(el) {
            const len = el.value.length;
            const max = parseInt(el.getAttribute('maxlength')) || 2000;
            const counter = document.getElementById('char-count');
            counter.textContent = `${len} / ${max}`;
            counter.classList.toggle('warn', len > max * 0.8);
            counter.classList.toggle('limit', len >= max);
        }

        // ─── Image preview ───────────────────────────────────
        function previewImage(input) {
            const preview = document.getElementById('img-preview');
            const area    = document.getElementById('upload-area');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    area.querySelector('.upload-icon').style.display = 'none';
                    area.querySelector('.upload-text').textContent = input.files[0].name;
                    area.querySelector('.upload-sub').textContent  = `${(input.files[0].size / 1024).toFixed(0)} КБ`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ─── Drag & drop ─────────────────────────────────────
        const area = document.getElementById('upload-area');

        area.addEventListener('dragover', e => {
            e.preventDefault();
            area.classList.add('dragover');
        });

        area.addEventListener('dragleave', () => area.classList.remove('dragover'));

        area.addEventListener('drop', e => {
            e.preventDefault();
            area.classList.remove('dragover');
            const input = document.getElementById('image-input');
            if (e.dataTransfer.files.length) {
                input.files = e.dataTransfer.files;
                previewImage(input);
            }
        });

        // ─── Submit guard ────────────────────────────────────
        document.getElementById('post-form').addEventListener('submit', function () {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Публикация...';
        });

        // ─── Logout ─────────────────────────────────────────
        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => {
                localStorage.removeItem('blink_user');
                window.location.href = '/';
            });
        }
    </script>
</body>
</html>
